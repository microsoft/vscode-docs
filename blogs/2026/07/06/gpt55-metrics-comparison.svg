<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Grouped bar chart comparing the percentage impact of Treatment A and Treatment B versus the control baseline across seven metrics.">
  <rect x="0" y="0" width="900" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#24292f">Metric impact vs. control baseline (%)</text>

  <!-- Y axis label -->
  <text x="20" y="210" text-anchor="middle" font-size="12" fill="#57606a" transform="rotate(-90 20 210)">% change vs. control</text>

  <!-- Grid lines and Y ticks (value: y) 1:60, 0:87.3, -2:141.8, -4:196.4, -6:250.9, -8:305.5, -10:360 -->
  <g stroke="#e1e4e8" stroke-width="1">
    <line x1="70" y1="60"    x2="880" y2="60"/>
    <line x1="70" y1="141.8" x2="880" y2="141.8"/>
    <line x1="70" y1="196.4" x2="880" y2="196.4"/>
    <line x1="70" y1="250.9" x2="880" y2="250.9"/>
    <line x1="70" y1="305.5" x2="880" y2="305.5"/>
    <line x1="70" y1="360"   x2="880" y2="360"/>
  </g>
  <g font-size="11" fill="#57606a" text-anchor="end">
    <text x="62" y="64">+1</text>
    <text x="62" y="145.8">-2</text>
    <text x="62" y="200.4">-4</text>
    <text x="62" y="254.9">-6</text>
    <text x="62" y="309.5">-8</text>
    <text x="62" y="364">-10</text>
  </g>

  <!-- Zero baseline (control) -->
  <line x1="70" y1="87.3" x2="880" y2="87.3" stroke="#24292f" stroke-width="1.5"/>
  <text x="874" y="82" text-anchor="end" font-size="11" font-weight="600" fill="#24292f">Control = 0</text>

  <!-- Bars: A = #0072b2 (blue), B = #e69f00 (orange), colorblind-safe (Okabe-Ito) -->
  <!-- Group 0: 10-min survival  A -0.40 (h10.9)  B -0.44 (h12.0) -->
  <rect x="90"  y="87.3" width="34" height="10.9" fill="#0072b2"/>
  <rect x="132" y="87.3" width="34" height="12.0" fill="#e69f00"/>
  <text x="107" y="112" text-anchor="middle" font-size="9.5" fill="#57606a">-0.40</text>
  <text x="149" y="123" text-anchor="middle" font-size="9.5" fill="#57606a">-0.44</text>

  <!-- Group 1: Commit survival  A -0.48 (h13.1 down)  B +0.68 (h18.5 up) -->
  <rect x="206" y="87.3"  width="34" height="13.1" fill="#0072b2"/>
  <rect x="248" y="68.8"  width="34" height="18.5" fill="#e69f00"/>
  <text x="223" y="114" text-anchor="middle" font-size="9.5" fill="#57606a">-0.48</text>
  <text x="265" y="63"  text-anchor="middle" font-size="9.5" fill="#1a7f37">+0.68</text>

  <!-- Group 2: p50 TTFE  A -2.88 (h78.5)  B -5.68 (h154.9) -->
  <rect x="321" y="87.3" width="34" height="78.5"  fill="#0072b2"/>
  <rect x="363" y="87.3" width="34" height="154.9" fill="#e69f00"/>
  <text x="338" y="178" text-anchor="middle" font-size="9.5" fill="#57606a">-2.88</text>
  <text x="380" y="255" text-anchor="middle" font-size="9.5" fill="#57606a">-5.68</text>

  <!-- Group 3: p95 TTFE  A -1.93 (h52.6)  B -9.30 (h253.6) -->
  <rect x="437" y="87.3" width="34" height="52.6"  fill="#0072b2"/>
  <rect x="479" y="87.3" width="34" height="253.6" fill="#e69f00"/>
  <text x="454" y="152" text-anchor="middle" font-size="9.5" fill="#57606a">-1.93</text>
  <text x="496" y="354" text-anchor="middle" font-size="9.5" fill="#57606a">-9.30</text>

  <!-- Group 4: p50 tokens  A -2.54 (h69.3)  B -3.25 (h88.6) -->
  <rect x="553" y="87.3" width="34" height="69.3" fill="#0072b2"/>
  <rect x="595" y="87.3" width="34" height="88.6" fill="#e69f00"/>
  <text x="570" y="169" text-anchor="middle" font-size="9.5" fill="#57606a">-2.54</text>
  <text x="612" y="188" text-anchor="middle" font-size="9.5" fill="#57606a">-3.25</text>

  <!-- Group 5: p95 tokens  A -5.19 (h141.5)  B -7.64 (h208.3) -->
  <rect x="668" y="87.3" width="34" height="141.5" fill="#0072b2"/>
  <rect x="710" y="87.3" width="34" height="208.3" fill="#e69f00"/>
  <text x="685" y="241" text-anchor="middle" font-size="9.5" fill="#57606a">-5.19</text>
  <text x="727" y="308" text-anchor="middle" font-size="9.5" fill="#57606a">-7.64</text>

  <!-- Group 6: Avg tool calls  A -3.19 (h87.0)  B -8.54 (h232.9) -->
  <rect x="784" y="87.3" width="34" height="87.0"  fill="#0072b2"/>
  <rect x="826" y="87.3" width="34" height="232.9" fill="#e69f00"/>
  <text x="801" y="186" text-anchor="middle" font-size="9.5" fill="#57606a">-3.19</text>
  <text x="843" y="333" text-anchor="middle" font-size="9.5" fill="#57606a">-8.54</text>

  <!-- X axis category labels (two lines each), centered under groups -->
  <g font-size="11" fill="#24292f" text-anchor="middle">
    <text x="128" y="382">10-min</text>
    <text x="128" y="396">survival</text>

    <text x="244" y="382">Commit</text>
    <text x="244" y="396">survival</text>

    <text x="359" y="382">p50 Time to</text>
    <text x="359" y="396">First Edit</text>

    <text x="475" y="382">p95 Time to</text>
    <text x="475" y="396">First Edit</text>

    <text x="591" y="382">p50 total</text>
    <text x="591" y="396">tokens</text>

    <text x="706" y="382">p95 total</text>
    <text x="706" y="396">tokens</text>

    <text x="822" y="382">Avg tool</text>
    <text x="822" y="396">calls</text>
  </g>

  <!-- Legend -->
  <g font-size="12" fill="#24292f">
    <rect x="300" y="470" width="16" height="16" fill="#0072b2"/>
    <text x="322" y="483">Treatment A (PRPT_SRCH)</text>
    <rect x="510" y="470" width="16" height="16" fill="#e69f00"/>
    <text x="532" y="483">Treatment B (PRPT_LRG)</text>
  </g>

  <!-- Direction note -->
  <text x="450" y="440" text-anchor="middle" font-size="11" fill="#57606a">Bars below the control line are reductions. Lower is better for latency, tokens, and tool calls; higher is better for survival rates.</text>
</svg>
