<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Diagram contrasting an agent that over-explores with many scattered search and read steps before its first edit, versus a Treatment B agent that moves through a deliberate anchor, gather minimal context, edit, and validate loop.">
  <defs>
    <marker id="arrowGrey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e69f00"/>
    </marker>
    <style>
      .track { fill: none; stroke-width: 2.5; }
      .wander { stroke: #8b949e; stroke-dasharray: 1400; stroke-dashoffset: 1400; animation: draw 6s ease-in-out infinite; }
      .loopseg { stroke: #e69f00; stroke-dasharray: 260; stroke-dashoffset: 260; animation: draw 6s ease-in-out infinite; }
      @keyframes draw { 0% { stroke-dashoffset: var(--len, 1400); } 55% { stroke-dashoffset: 0; } 90% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: var(--len, 1400); } }
      .loopseg { --len: 260; }
      .dotGrey { fill: #57606a; }
      .dotOrange { fill: #b26a00; }
      .node { fill: #ffffff; stroke-width: 2; }
      .nodeGrey { stroke: #b1b7bd; }
      .nodeOrange { stroke: #e69f00; }
      .nlabel { font-size: 11px; fill: #24292f; text-anchor: middle; }
      .nsub { font-size: 9px; fill: #6e7781; text-anchor: middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="470" fill="#ffffff"/>

  <!-- Divider -->
  <line x1="450" y1="70" x2="450" y2="430" stroke="#e1e4e8" stroke-width="1"/>

  <!-- ============ LEFT: BEFORE ============ -->
  <text x="225" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="#24292f">Before: the agent over-explores</text>
  <text x="225" y="56" text-anchor="middle" font-size="12" fill="#57606a">Many searches and re-reads before the first edit</text>

  <!-- wandering path -->
  <path id="wanderPath" class="track wander"
        d="M70,150 C120,90 150,110 175,140 S150,210 120,220 S210,150 245,175 S190,260 240,270 S300,150 300,190 S250,255 320,255 S360,180 360,300 S345,340 385,345"/>
  <circle r="6" class="dotGrey">
    <animateMotion dur="6s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0;0.55;1" calcMode="linear">
      <mpath href="#wanderPath"/>
    </animateMotion>
  </circle>

  <!-- scattered exploration nodes -->
  <g class="nsub">
    <circle cx="70"  cy="150" r="12" class="node nodeGrey"/><text x="70"  y="176">start</text>
    <circle cx="175" cy="140" r="12" class="node nodeGrey"/><text x="175" y="120">search</text>
    <circle cx="120" cy="220" r="12" class="node nodeGrey"/><text x="120" y="246">read</text>
    <circle cx="245" cy="175" r="12" class="node nodeGrey"/><text x="245" y="155">search</text>
    <circle cx="240" cy="270" r="12" class="node nodeGrey"/><text x="240" y="296">read</text>
    <circle cx="300" cy="190" r="12" class="node nodeGrey"/><text x="300" y="170">compare</text>
    <circle cx="320" cy="255" r="12" class="node nodeGrey"/><text x="320" y="281">read</text>
  </g>
  <!-- delayed first edit -->
  <circle cx="385" cy="345" r="16" fill="#fbe6c8" stroke="#e69f00" stroke-width="2"/>
  <text x="385" y="349" text-anchor="middle" font-size="10" font-weight="600" fill="#8a5a00">edit</text>
  <text x="385" y="378" text-anchor="middle" font-size="10" fill="#6e7781">first edit lands late</text>

  <!-- ============ RIGHT: AFTER ============ -->
  <text x="675" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="#24292f">After: a deliberate loop</text>
  <text x="675" y="56" text-anchor="middle" font-size="12" fill="#57606a">Anchor, minimal context, act, then validate</text>

  <!-- loop connecting segments (clockwise) -->
  <path class="track loopseg" d="M600,130 L750,130" marker-end="url(#arrowOrange)"/>
  <path class="track loopseg" d="M780,160 L780,290" marker-end="url(#arrowOrange)"/>
  <path class="track loopseg" d="M750,320 L600,320" marker-end="url(#arrowOrange)"/>
  <path class="track loopseg" d="M570,290 L570,160" marker-end="url(#arrowOrange)"/>

  <!-- moving dot around the loop -->
  <path id="loopPath" fill="none" stroke="none" d="M575,130 L745,130 L780,165 L780,285 L745,320 L575,320 L570,285 L570,165 Z"/>
  <circle r="6" class="dotOrange">
    <animateMotion dur="6s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.05;0.9;1" calcMode="linear">
      <mpath href="#loopPath"/>
    </animateMotion>
  </circle>

  <!-- loop nodes -->
  <g>
    <rect x="512" y="110" width="118" height="40" rx="20" class="node nodeOrange"/>
    <text x="571" y="128" class="nlabel" font-weight="600">Anchor</text>
    <text x="571" y="141" class="nsub">file, symbol, failure</text>

    <rect x="720" y="110" width="118" height="40" rx="20" class="node nodeOrange"/>
    <text x="779" y="128" class="nlabel" font-weight="600">Minimal context</text>
    <text x="779" y="141" class="nsub">one local hypothesis</text>

    <rect x="720" y="300" width="118" height="40" rx="20" class="node nodeOrange"/>
    <text x="779" y="318" class="nlabel" font-weight="600">Grounded edit</text>
    <text x="779" y="331" class="nsub">smallest useful change</text>

    <rect x="512" y="300" width="118" height="40" rx="20" class="node nodeOrange"/>
    <text x="571" y="318" class="nlabel" font-weight="600">Validate</text>
    <text x="571" y="331" class="nsub">focused check or test</text>
  </g>

  <text x="675" y="378" text-anchor="middle" font-size="10" fill="#6e7781">first edit lands sooner, fewer tool calls</text>

  <!-- ============ Outcome caption bar ============ -->
  <g font-size="12">
    <text x="225" y="425" text-anchor="middle" fill="#57606a">Same task, more wandering</text>
    <text x="675" y="425" text-anchor="middle" fill="#b26a00" font-weight="600">Same task, faster and leaner</text>
  </g>
</svg>
